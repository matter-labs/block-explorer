name: Create Release

on:
  push:
    branches:
      - main
      - '[0-9]+.*'

jobs:
  createReleaseVersion:
    name: Create Release Version
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      releaseVersion: ${{ steps.release.outputs.releaseVersion }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci

      - name: Lint
        run: |
          npm run lint -- -- --no-fix --max-warnings 0

      - name: Test
        run: |
          npm run test:ci

      - name: App type check
        working-directory: ./packages/app
        run: |
          npm run typecheck

      - name: Create Release Version
        id: release
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
            VITE_APP_ENVIRONMENT=production \
              npx semantic-release

  # Publish the app's assets + public images to the R2 bucket before the App image is pushed so the files are already in place when it goes live.
  publishStaticAssetsToR2:
    name: Publish app static assets to R2
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: createReleaseVersion
    if: ${{ github.ref == 'refs/heads/main' && needs.createReleaseVersion.outputs.releaseVersion != '' }}
    # STATIC_ASSETS_UPLOAD_FOLDER is a secret, and secrets can't be referenced in `if:` — so mirror it
    # into a job-level env and gate the steps on that (empty = R2 not configured -> steps skip).
    env:
      STATIC_ASSETS_UPLOAD_FOLDER: ${{ secrets.STATIC_ASSETS_UPLOAD_FOLDER }}
    steps:
      - name: Download Dist package
        if: ${{ env.STATIC_ASSETS_UPLOAD_FOLDER != '' }}
        uses: dsaltares/fetch-gh-release-asset@aa2ab1243d6e0d5b405b973c89fa4d06a2d0fff7 # 1.1.2
        with:
          version: "tags/v${{ needs.createReleaseVersion.outputs.releaseVersion }}"
          file: "dist.zip"
          target: "dist.zip"
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Unzip Dist package
        if: ${{ env.STATIC_ASSETS_UPLOAD_FOLDER != '' }}
        run: |
          unzip dist.zip

      - name: Publish to R2
        if: ${{ env.STATIC_ASSETS_UPLOAD_FOLDER != '' }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.STATIC_ASSETS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.STATIC_ASSETS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          ASSETS_S3_ENDPOINT: ${{ secrets.STATIC_ASSETS_S3_ENDPOINT }}
        run: |
          set -e
          APP_DIST=dist
          ASSETS_DEST="s3://${STATIC_ASSETS_UPLOAD_FOLDER}"
          VERSION="${{ needs.createReleaseVersion.outputs.releaseVersion }}"

          aws s3 sync "$APP_DIST/assets" "$ASSETS_DEST/$VERSION/assets" --endpoint-url "$ASSETS_S3_ENDPOINT" \
            --cache-control "public, max-age=31536000, immutable" --exclude "*.map"
          aws s3 sync "$APP_DIST/images" "$ASSETS_DEST/$VERSION/images" --endpoint-url "$ASSETS_S3_ENDPOINT" \
            --cache-control "public, max-age=31536000, immutable"

          # Retention: keep only the newest 100 version folders, delete the rest.
          KEEP=100
          STALE=$(aws s3 ls "$ASSETS_DEST/" --endpoint-url "$ASSETS_S3_ENDPOINT" \
            | awk '/ PRE / {print $2}' | sed 's#/$##' | grep -E '^[0-9]' | sort -V | head -n "-$KEEP" || true)
          for v in $STALE; do
            echo "Pruning old asset version: $v"
            aws s3 rm "$ASSETS_DEST/$v/" --recursive --endpoint-url "$ASSETS_S3_ENDPOINT"
          done

  deployBackendToStaging:
    name: Deploy Block Explorer backend to staging
    runs-on: [matterlabs-ci-runner]
    permissions:
      contents: read
      packages: write
    needs: [createReleaseVersion, publishStaticAssetsToR2]
    # always() so a skipped R2 job (bucket not configured) doesn't skip this one; but a real R2
    # failure does block the image push (assets must be live first).
    if: ${{ always() && github.ref == 'refs/heads/main' && needs.createReleaseVersion.outputs.releaseVersion != '' && needs.publishStaticAssetsToR2.result != 'failure' && needs.publishStaticAssetsToR2.result != 'cancelled' }}
    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Build
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Login to GitHub Container Registry
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate build ID for Flux Image Automation
        id: setVersionForFlux
        run: |
          sha=$(git rev-parse --short HEAD)
          ts=$(date +%s%N | cut -b1-13)
          echo "::set-output name=imageTag::${sha}-${ts}"

      - name: Auth to google artifact registry
        run: |
          gcloud auth configure-docker us-docker.pkg.dev -q 

      - name: Build and push Docker image for API
        uses: docker/build-push-action@v4
        with:
          push: true
          tags: |
              "matterlabs/block-explorer-api:latest"
              "matterlabs/block-explorer-api:v${{ needs.createReleaseVersion.outputs.releaseVersion }}"
              "matterlabs/block-explorer-api:${{ steps.setVersionForFlux.outputs.imageTag }}"
              "ghcr.io/matter-labs/block-explorer-api:latest"
              "ghcr.io/matter-labs/block-explorer-api:v${{ needs.createReleaseVersion.outputs.releaseVersion }}"
              "ghcr.io/matter-labs/block-explorer-api:${{ steps.setVersionForFlux.outputs.imageTag }}"
              "us-docker.pkg.dev/matterlabs-infra/matterlabs-docker/block-explorer-api:latest"
              "us-docker.pkg.dev/matterlabs-infra/matterlabs-docker/block-explorer-api:v${{ needs.createReleaseVersion.outputs.releaseVersion }}"
              "us-docker.pkg.dev/matterlabs-infra/matterlabs-docker/block-explorer-api:${{ steps.setVersionForFlux.outputs.imageTag }}"
          file: packages/api/Dockerfile
          no-cache: true

      - name: Build and push Docker image for Worker
        uses: docker/build-push-action@v4
        with:
          push: true
          tags: |
              "matterlabs/block-explorer-worker:latest"
              "matterlabs/block-explorer-worker:v${{ needs.createReleaseVersion.outputs.releaseVersion }}"
              "matterlabs/block-explorer-worker:${{ steps.setVersionForFlux.outputs.imageTag }}"
              "ghcr.io/matter-labs/block-explorer-worker:latest"
              "ghcr.io/matter-labs/block-explorer-worker:v${{ needs.createReleaseVersion.outputs.releaseVersion }}"
              "ghcr.io/matter-labs/block-explorer-worker:${{ steps.setVersionForFlux.outputs.imageTag }}"
              "us-docker.pkg.dev/matterlabs-infra/matterlabs-docker/block-explorer-worker:latest"
              "us-docker.pkg.dev/matterlabs-infra/matterlabs-docker/block-explorer-worker:v${{ needs.createReleaseVersion.outputs.releaseVersion }}"
              "us-docker.pkg.dev/matterlabs-infra/matterlabs-docker/block-explorer-worker:${{ steps.setVersionForFlux.outputs.imageTag }}"
          file: packages/worker/Dockerfile
          no-cache: true

      - name: Build and push Docker image for Data Fetcher
        uses: docker/build-push-action@v4
        with:
          push: true
          tags: |
              "matterlabs/block-explorer-data-fetcher:latest"
              "matterlabs/block-explorer-data-fetcher:v${{ needs.createReleaseVersion.outputs.releaseVersion }}"
              "matterlabs/block-explorer-data-fetcher:${{ steps.setVersionForFlux.outputs.imageTag }}"
              "ghcr.io/matter-labs/block-explorer-data-fetcher:latest"
              "ghcr.io/matter-labs/block-explorer-data-fetcher:v${{ needs.createReleaseVersion.outputs.releaseVersion }}"
              "ghcr.io/matter-labs/block-explorer-data-fetcher:${{ steps.setVersionForFlux.outputs.imageTag }}"
              "us-docker.pkg.dev/matterlabs-infra/matterlabs-docker/block-explorer-data-fetcher:latest"
              "us-docker.pkg.dev/matterlabs-infra/matterlabs-docker/block-explorer-data-fetcher:v${{ needs.createReleaseVersion.outputs.releaseVersion }}"
              "us-docker.pkg.dev/matterlabs-infra/matterlabs-docker/block-explorer-data-fetcher:${{ steps.setVersionForFlux.outputs.imageTag }}"
          file: packages/data-fetcher/Dockerfile
          no-cache: true

      - name: Build and push Docker image for App
        uses: docker/build-push-action@v4
        with:
          push: true
          build-args: |
              VITE_VERSION=${{ needs.createReleaseVersion.outputs.releaseVersion }}
          tags: |
              "matterlabs/block-explorer-app:latest"
              "matterlabs/block-explorer-app:v${{ needs.createReleaseVersion.outputs.releaseVersion }}"
              "matterlabs/block-explorer-app:${{ steps.setVersionForFlux.outputs.imageTag }}"
              "ghcr.io/matter-labs/block-explorer-app:latest"
              "ghcr.io/matter-labs/block-explorer-app:v${{ needs.createReleaseVersion.outputs.releaseVersion }}"
              "ghcr.io/matter-labs/block-explorer-app:${{ steps.setVersionForFlux.outputs.imageTag }}"
              "us-docker.pkg.dev/matterlabs-infra/matterlabs-docker/block-explorer-app:latest"
              "us-docker.pkg.dev/matterlabs-infra/matterlabs-docker/block-explorer-app:v${{ needs.createReleaseVersion.outputs.releaseVersion }}"
              "us-docker.pkg.dev/matterlabs-infra/matterlabs-docker/block-explorer-app:${{ steps.setVersionForFlux.outputs.imageTag }}"
          file: packages/app/Dockerfile
          no-cache: true

  sbom-generation:
    name: SBOM
    needs: [ 'createReleaseVersion', 'deployBackendToStaging' ]
    permissions:
      contents: read
      packages: read
    uses: ./.github/workflows/sbom-analysis-reusable.yml
    secrets: inherit
    with:
      version: ${{ needs.createReleaseVersion.outputs.releaseVersion }}


  deployFrontendToStaging:
    name: Deploy Block Explorer frontend to staging
    runs-on: matterlabs-firebase-deployer
    permissions:
      contents: read
    needs: createReleaseVersion
    if: ${{ github.ref == 'refs/heads/main' && needs.createReleaseVersion.outputs.releaseVersion != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Firebase CLI and auth
        run: |
          npm install -g firebase-tools

      - name: Download Dist package
        uses: dsaltares/fetch-gh-release-asset@aa2ab1243d6e0d5b405b973c89fa4d06a2d0fff7 # 1.1.2
        with:
          version: "tags/v${{ needs.createReleaseVersion.outputs.releaseVersion }}"
          file: "dist.zip"
          target: "dist.zip"
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Unzip Dist package
        run: |
          unzip dist.zip -d packages/app

      - name: Update config
        run: |
          echo "window[\"##runtimeConfig\"] = { appEnvironment: \"staging\", sentryDSN: \"${{ vars.SENTRY_DSN }}\"  };" > packages/app/dist/config.js

      - name: Download Storybook package
        uses: dsaltares/fetch-gh-release-asset@aa2ab1243d6e0d5b405b973c89fa4d06a2d0fff7 # 1.1.2
        with:
          version: "tags/v${{ needs.createReleaseVersion.outputs.releaseVersion }}"
          file: "storybook-static.zip"
          target: "storybook-static.zip"
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Unzip Storybook package
        run: |
          unzip storybook-static.zip -d packages/app

      - name: Deploy
        working-directory: ./packages/app
        run: |
          firebase --project staging-scan-v2 deploy

