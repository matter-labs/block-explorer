config:
  target: "http://127.0.0.1:3020"
  http:
    timeout: 100
    extendedMetrics: true
  phases:
    - duration: 500
      arrivalCount: 100

  environments:
    local:
      target: "http://localhost:3020"
  plugins:
    metrics-by-endpoint:
      useOnlyRequestNames: true
  variables:
    limit: 10
    addresses:
      - ["0x0000000000000000000000000000000000008001"]
      - ["0x0000000000000000000000000000000000008007"]

scenarios:
  - name: "Address page endpoints"
    flow:
      # ADDRESS
      - loop:
          - get:
              name: "/address/{address}"
              url: "/address/{{ $loopElement }}"
        over: addresses

      # TRANSACTIONS
      - loop:
          - get:
              name: "/transactions with address"
              url: "/transactions"
              qs:
                limit: "{{ limit }}"
                page: "{{ $randomNumber(1, 5) }}"
                address: "{{ $loopElement }}"
        over: addresses

      # TRANSFERS
      - loop:
          - get:
              name: "/address/{address}/transfers"
              url: "/address/{{ $loopElement }}/transfers"
              qs:
                limit: "{{ limit }}"
                page: "{{ $randomNumber(1, 5) }}"
        over: addresses
